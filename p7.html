<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Profile Finder Pro</title>

    <!-- Font Awesome & Google Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Emerald Dark Theme Palette */
            --bg-dark: #0b1311;
            --card-bg: rgba(18, 30, 27, 0.75);
            --card-border: rgba(52, 211, 153, 0.12);
            --accent-emerald: #10b981;
            --accent-teal: #14b8a6;
            --text-main: #f0fdf4;
            --text-muted: #94a3b8;
            --radius-md: 12px;
            --radius-lg: 18px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 15% 15%, rgba(16, 185, 129, 0.15) 0px, transparent 40%),
                radial-gradient(at 85% 85%, rgba(20, 184, 166, 0.15) 0px, transparent 40%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 520px;
        }

        .search-box {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(16px);
            padding: 1.8rem;
            border-radius: var(--radius-lg);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 1.5rem;
        }

        .search-box h1 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 1.2rem;
            text-align: center;
            background: linear-gradient(135deg, var(--accent-emerald), var(--accent-teal));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            display: flex;
            gap: 0.6rem;
        }

        input {
            flex: 1;
            padding: 0.85rem 1rem;
            background: rgba(11, 19, 17, 0.7);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-md);
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition);
        }

        input:focus {
            border-color: var(--accent-emerald);
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.3);
        }

        button {
            padding: 0.85rem 1.4rem;
            border: none;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, var(--accent-emerald), var(--accent-teal));
            color: #04120e;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
        }

        /* Results Display */
        #profile {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .profile-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(16px);
            border-radius: var(--radius-lg);
            padding: 1.8rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.4s ease-in-out;
        }

        .user-header {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            margin-bottom: 1.2rem;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid var(--accent-emerald);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.35);
        }

        .user-info h2 {
            font-size: 1.3rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .user-info .username {
            color: var(--accent-emerald);
            font-size: 0.88rem;
            font-weight: 500;
            margin-bottom: 0.3rem;
        }

        .user-info .location {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .bio {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 1.2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.8rem;
            background: rgba(11, 19, 17, 0.7);
            padding: 1rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--card-border);
            text-align: center;
            margin-bottom: 1.2rem;
        }

        .stat-box span {
            display: block;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent-emerald);
        }

        .stat-box label {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Repos Section */
        .repos-title {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
            color: var(--text-main);
        }

        .repos-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            margin-bottom: 1.2rem;
        }

        .repo-card {
            background: rgba(11, 19, 17, 0.5);
            border: 1px solid var(--card-border);
            padding: 0.8rem;
            border-radius: var(--radius-md);
            text-decoration: none;
            color: var(--text-main);
            transition: var(--transition);
        }

        .repo-card:hover {
            border-color: var(--accent-emerald);
            transform: translateY(-2px);
        }

        .repo-card h4 {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .repo-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .view-profile-btn {
            display: block;
            width: 100%;
            text-align: center;
            padding: 0.75rem;
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-emerald);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: var(--radius-md);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: var(--transition);
        }

        .view-profile-btn:hover {
            background: var(--accent-emerald);
            color: #04120e;
        }

        .error-card {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            padding: 1rem;
            border-radius: var(--radius-md);
            text-align: center;
            font-size: 0.9rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .repos-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="search-box">
            <h1><i class="fa-brands fa-github"></i> Profile Finder</h1>
            <div class="input-group">
                <input type="text" id="username" placeholder="Enter GitHub username..." autocomplete="off">
                <button id="searchBtn"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
            </div>
        </div>

        <div id="profile"></div>
    </div>

    <script>
        const searchBtn = document.getElementById("searchBtn");
        const usernameInput = document.getElementById("username");
        const profileContainer = document.getElementById("profile");

        searchBtn.addEventListener("click", getProfile);
        usernameInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") getProfile();
        });

        async function getProfile() {
            const username = usernameInput.value.trim();

            if (username === "") {
                showError("Please enter a valid GitHub username.");
                return;
            }

            profileContainer.innerHTML = `
                <div class="profile-card" style="text-align: center; color: var(--text-muted);">
                    <i class="fa-solid fa-circle-notch fa-spin fa-2x" style="color: var(--accent-emerald);"></i>
                    <p style="margin-top: 0.8rem; font-size: 0.9rem;">Fetching profile data...</p>
                </div>
            `;

            try {
                const userRes = await fetch(`https://api.github.com/users/${username}`);
                if (!userRes.ok) throw new Error("User not found!");

                const userData = await userRes.json();

                const repoRes = await fetch(`https://api.github.com/users/${username}/repos?sort=updated&per_page=4`);
                const repoData = await repoRes.json();

                displayProfile(userData, repoData);

            } catch (error) {
                showError(error.message);
            }
        }

        function displayProfile(user, repos) {
            let reposHTML = "";
            
            if (repos.length > 0) {
                reposHTML = `
                    <div class="repos-title"><i class="fa-solid fa-code"></i> Latest Repositories</div>
                    <div class="repos-grid">
                        ${repos.map(repo => `
                            <a href="${repo.html_url}" target="_blank" class="repo-card">
                                <h4>${repo.name}</h4>
                                <div class="repo-meta">
                                    <span><i class="fa-solid fa-circle" style="font-size: 0.6rem; color: var(--accent-emerald);"></i> ${repo.language || 'Code'}</span>
                                    <span><i class="fa-regular fa-star"></i> ${repo.stargazers_count}</span>
                                </div>
                            </a>
                        `).join('')}
                    </div>
                `;
            }

            profileContainer.innerHTML = `
                <div class="profile-card">
                    <div class="user-header">
                        <img src="${user.avatar_url}" alt="${user.name}" class="avatar">
                        <div class="user-info">
                            <h2>${user.name || user.login}</h2>
                            <div class="username">@${user.login}</div>
                            ${user.location ? `<div class="location"><i class="fa-solid fa-location-dot"></i> ${user.location}</div>` : ''}
                        </div>
                    </div>

                    <p class="bio">${user.bio || "No biography provided."}</p>

                    <div class="stats-grid">
                        <div class="stat-box">
                            <span>${user.public_repos}</span>
                            <label>Repos</label>
                        </div>
                        <div class="stat-box">
                            <span>${user.followers}</span>
                            <label>Followers</label>
                        </div>
                        <div class="stat-box">
                            <span>${user.following}</span>
                            <label>Following</label>
                        </div>
                    </div>

                    ${reposHTML}

                    <a href="${user.html_url}" target="_blank" class="view-profile-btn">
                        View Full GitHub Profile <i class="fa-solid fa-arrow-up-right-from-square"></i>
                    </a>
                </div>
            `;
        }

        function showError(message) {
            profileContainer.innerHTML = `
                <div class="error-card">
                    <i class="fa-solid fa-triangle-exclamation"></i> ${message}
                </div>
            `;
        }
    </script>
</body>

</html>
